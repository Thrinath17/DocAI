# To run multiple workers for parallel job processing:
#   docker compose -f docker/docker-compose.yml up --scale worker=2
#
# Each worker instance shares the uploads/, results/, and jobs.db volumes.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Ollama runs natively on host — not in Docker
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ../uploads:/app/uploads
      - ../results:/app/results
      - ../jobs.db:/app/jobs.db
      - ../ui/dist:/app/ui/dist:ro
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ../uploads:/app/uploads
      - ../results:/app/results
      - ../jobs.db:/app/jobs.db
    depends_on:
      redis:
        condition: service_healthy
    command: rq worker extraction --url redis://redis:6379/0
